<!DOCTYPE html>
<html lang="ja">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Gemini Master Quiz - 50問で学ぶ生成AI</title>
    <!-- Google Fonts: Roboto & Noto Sans JP -->
    <link href="https://fonts.googleapis.com/css2?family=Roboto:wght@400;500;700&family=Noto+Sans+JP:wght@400;500;700&display=swap" rel="stylesheet">
    <style>
        :root {
            /* Google Brand Colors */
            --google-blue: #4285F4;
            --google-red: #EA4335;
            --google-yellow: #FBBC05;
            --google-green: #34A853;

            /* Light Theme (Material 3 inspired) */
            --bg-color: #f8f9fa;
            --card-bg: #ffffff;
            --text-main: #202124;
            --text-muted: #5f6368;
            --border-color: #dadce0;
            --hover-bg: #f1f3f4;
            --primary-color: var(--google-blue);
            
            /* Feedback Colors */
            --correct-bg: #e6f4ea;
            --correct-text: #137333;
            --incorrect-bg: #fce8e6;
            --incorrect-text: #c5221f;
            
            --border-radius-lg: 24px;
            --border-radius-md: 12px;
            --shadow-sm: 0 1px 2px 0 rgba(60,64,67,0.3), 0 1px 3px 1px rgba(60,64,67,0.15);
            --shadow-md: 0 4px 6px -1px rgba(0, 0, 0, 0.1), 0 2px 4px -1px rgba(0, 0, 0, 0.06);
        }

        /* Dark Mode Support */
        @media (prefers-color-scheme: dark) {
            :root {
                --bg-color: #202124;
                --card-bg: #292a2d;
                --text-main: #e8eaed;
                --text-muted: #9aa0a6;
                --border-color: #5f6368;
                --hover-bg: #3c4043;
                --primary-color: #8ab4f8; /* Lighter blue for dark mode */
                
                --correct-bg: rgba(52, 168, 83, 0.2);
                --correct-text: #81c995;
                --incorrect-bg: rgba(234, 67, 53, 0.2);
                --incorrect-text: #f28b82;
            }
        }

        * {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        body {
            /* Fallback to Roboto/Noto Sans, using Google Sans if installed locally */
            font-family: 'Google Sans', 'Roboto', 'Noto Sans JP', sans-serif;
            background-color: var(--bg-color);
            color: var(--text-main);
            line-height: 1.6;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            padding: 20px;
        }

        .container {
            background-color: var(--card-bg);
            width: 100%;
            max-width: 800px;
            border-radius: var(--border-radius-lg);
            box-shadow: var(--shadow-sm);
            overflow: hidden;
            position: relative;
        }

        /* Google Color Top Bar */
        .top-color-bar {
            height: 6px;
            width: 100%;
            background: linear-gradient(to right, 
                var(--google-blue) 0%, var(--google-blue) 25%, 
                var(--google-red) 25%, var(--google-red) 50%, 
                var(--google-yellow) 50%, var(--google-yellow) 75%, 
                var(--google-green) 75%, var(--google-green) 100%);
        }

        .header {
            padding: 30px 20px 20px;
            text-align: center;
            border-bottom: 1px solid var(--border-color);
        }

        .header h1 {
            font-size: 1.8rem;
            margin-bottom: 8px;
            font-weight: 700;
        }
        
        /* G logo style text for branding */
        .g-brand { color: var(--google-blue); }
        .e-brand { color: var(--google-red); }
        .m-brand { color: var(--google-yellow); }
        .i-brand { color: var(--google-blue); }
        .n-brand { color: var(--google-green); }
        .i2-brand { color: var(--google-red); }

        .header p {
            font-size: 0.95rem;
            color: var(--text-muted);
        }

        .content {
            padding: 30px 40px 40px;
        }

        /* Buttons (Material style) */
        .btn {
            background-color: var(--primary-color);
            color: #ffffff; /* Button text is always white/dark-contrast */
            border: none;
            padding: 12px 32px;
            font-size: 1rem;
            font-weight: 500;
            border-radius: 9999px; /* Pill shape */
            cursor: pointer;
            transition: background-color 0.2s, box-shadow 0.2s, transform 0.1s;
            font-family: inherit;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            gap: 8px;
        }

        @media (prefers-color-scheme: dark) {
            .btn { color: #202124; } /* Dark text on light blue button in dark mode */
        }

        .btn:hover {
            box-shadow: var(--shadow-md);
            filter: brightness(0.95);
        }

        .btn:active {
            transform: translateY(1px);
        }
        
        .btn-outline {
            background-color: transparent;
            color: var(--text-main);
            border: 1px solid var(--border-color);
        }
        .btn-outline:hover {
            background-color: var(--hover-bg);
        }

        /* Start Screen */
        #start-screen {
            text-align: center;
        }

        #start-screen p {
            margin-bottom: 30px;
            color: var(--text-muted);
        }

        /* Quiz Screen */
        .progress-wrapper {
            display: flex;
            align-items: center;
            gap: 15px;
            margin-bottom: 25px;
        }

        .progress-container {
            flex-grow: 1;
            background-color: var(--hover-bg);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }

        .progress-bar {
            height: 100%;
            background-color: var(--primary-color);
            width: 0%;
            transition: width 0.4s cubic-bezier(0.4, 0, 0.2, 1);
        }
        
        .progress-text {
            font-size: 0.85rem;
            color: var(--text-muted);
            font-weight: 500;
            min-width: 60px;
        }

        .question-header {
            margin-bottom: 15px;
        }

        .category-badge {
            display: inline-block;
            padding: 4px 12px;
            border-radius: 16px;
            font-size: 0.8rem;
            font-weight: 500;
            background-color: var(--hover-bg);
            color: var(--text-muted);
            margin-bottom: 12px;
        }

        .question-text {
            font-size: 1.3rem;
            font-weight: 500;
            margin-bottom: 30px;
            line-height: 1.5;
        }

        .options {
            display: flex;
            flex-direction: column;
            gap: 12px;
        }

        .option-btn {
            background-color: var(--card-bg);
            border: 2px solid var(--border-color);
            color: var(--text-main);
            padding: 16px 20px;
            font-size: 1rem;
            border-radius: var(--border-radius-md);
            cursor: pointer;
            text-align: left;
            transition: all 0.2s;
            font-family: inherit;
            position: relative;
        }

        .option-btn:hover:not(:disabled) {
            border-color: var(--primary-color);
            background-color: var(--hover-bg);
        }

        .option-btn:disabled {
            cursor: default;
            opacity: 0.7;
        }

        /* Selected State Colors */
        .option-btn.correct {
            background-color: var(--correct-bg) !important;
            border-color: var(--google-green) !important;
            color: var(--correct-text) !important;
            opacity: 1;
        }
        
        .option-btn.incorrect {
            background-color: var(--incorrect-bg) !important;
            border-color: var(--google-red) !important;
            color: var(--incorrect-text) !important;
            opacity: 1;
        }

        /* Instant Feedback Area */
        .feedback-area {
            margin-top: 25px;
            padding: 20px;
            border-radius: var(--border-radius-md);
            animation: fadeIn 0.3s ease-in-out;
        }

        .feedback-area.correct { background-color: var(--correct-bg); border-left: 4px solid var(--google-green); }
        .feedback-area.incorrect { background-color: var(--incorrect-bg); border-left: 4px solid var(--google-red); }

        .feedback-result {
            font-size: 1.2rem;
            font-weight: 700;
            margin-bottom: 10px;
        }
        .feedback-area.correct .feedback-result { color: var(--correct-text); }
        .feedback-area.incorrect .feedback-result { color: var(--incorrect-text); }

        .feedback-explanation {
            font-size: 0.95rem;
            margin-bottom: 20px;
            color: var(--text-main);
        }

        /* Result Screen */
        .result-header {
            text-align: center;
            margin-bottom: 40px;
        }

        .score-display {
            font-size: 4rem;
            font-weight: 700;
            color: var(--primary-color);
            margin: 10px 0;
            line-height: 1;
        }

        .accuracy-display {
            font-size: 1.2rem;
            color: var(--text-muted);
            margin-bottom: 20px;
        }

        /* Category Stats */
        .category-stats {
            background-color: var(--hover-bg);
            border-radius: var(--border-radius-md);
            padding: 20px;
            margin-bottom: 30px;
        }
        
        .category-stats h3 {
            font-size: 1.1rem;
            margin-bottom: 15px;
            color: var(--text-main);
            text-align: center;
        }

        .stat-row {
            display: flex;
            align-items: center;
            margin-bottom: 12px;
            gap: 10px;
        }
        
        .stat-label {
            width: 100px;
            font-size: 0.9rem;
            font-weight: 500;
        }
        
        .stat-bar-container {
            flex-grow: 1;
            background-color: var(--border-color);
            height: 8px;
            border-radius: 4px;
            overflow: hidden;
        }
        
        .stat-bar {
            height: 100%;
            border-radius: 4px;
        }
        
        .stat-value {
            width: 40px;
            text-align: right;
            font-size: 0.85rem;
            color: var(--text-muted);
        }

        .action-buttons {
            display: flex;
            justify-content: center;
            gap: 15px;
            flex-wrap: wrap;
        }

        /* Modal Styles */
        .modal-overlay {
            position: fixed;
            top: 0;
            left: 0;
            right: 0;
            bottom: 0;
            background-color: rgba(0, 0, 0, 0.5);
            display: flex;
            justify-content: center;
            align-items: center;
            z-index: 1000;
            animation: fadeIn 0.2s ease-in-out;
        }

        .modal-content {
            background-color: var(--card-bg);
            padding: 30px;
            border-radius: var(--border-radius-md);
            max-width: 400px;
            width: 90%;
            text-align: center;
            box-shadow: var(--shadow-md);
        }

        .modal-content h3 {
            margin-bottom: 15px;
            color: var(--text-main);
        }

        .modal-content p {
            margin-bottom: 25px;
            color: var(--text-muted);
            font-size: 0.95rem;
        }

        .modal-actions {
            display: flex;
            justify-content: center;
            gap: 15px;
        }

        /* Top Bar Actions */
        .top-actions {
            display: flex;
            justify-content: flex-start;
            margin-bottom: 15px;
        }

        .btn-text {
            background: none;
            border: none;
            color: var(--text-muted);
            font-size: 0.9rem;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 5px;
            padding: 5px 10px;
            border-radius: 4px;
            transition: background-color 0.2s, color 0.2s;
            font-family: inherit;
            font-weight: 500;
        }

        .btn-text:hover {
            background-color: var(--hover-bg);
            color: var(--text-main);
        }

        .hidden { display: none !important; }

        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(-10px); }
            to { opacity: 1; transform: translateY(0); }
        }

        @media (max-width: 600px) {
            .content { padding: 25px 20px; }
            .question-text { font-size: 1.15rem; }
            .score-display { font-size: 3rem; }
            .stat-label { width: 80px; font-size: 0.8rem; }
        }
    </style>
</head>
<body>

<div class="container">
    <div class="top-color-bar"></div>
    <div class="header">
        <h1>
            <span class="g-brand">G</span><span class="e-brand">e</span><span class="m-brand">m</span><span class="i-brand">i</span><span class="n-brand">n</span><span class="i2-brand">i</span>
            Master Quiz
        </h1>
        <p>基礎から実践まで、最新のGoogleのAIを深く学ぶ50問（2026年版）</p>
    </div>

    <div class="content">
        <!-- Start Screen -->
        <div id="start-screen">
            <h2 style="margin-bottom: 10px; font-weight: 500;">あなたの生成AI活用力をテストします</h2>
            <p>
                基礎知識(40%)、実践的活用(50%)、雑学(10%)からなる全50問の3択クイズ。<br>
                1問ごとに表示される解説を読みながら、効率的に知識をアップデートしましょう。
            </p>
            <div id="start-actions" style="display: flex; flex-direction: column; align-items: center; gap: 15px;">
                <button id="start-btn" class="btn" onclick="startQuiz()">
                    クイズを始める
                    <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><line x1="5" y1="12" x2="19" y2="12"></line><polyline points="12 5 19 12 12 19"></polyline></svg>
                </button>
                
                <div id="resume-actions" class="hidden" style="display: flex; flex-direction: column; align-items: center; gap: 10px; width: 100%;">
                    <p id="resume-text" style="margin-bottom: 5px; color: var(--primary-color); font-weight: 500;">現在 問1 進行中</p>
                    <button class="btn" onclick="resumeQuiz()">
                        続きから始める
                        <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><polygon points="5 3 19 12 5 21 5 3"></polygon></svg>
                    </button>
                    <button class="btn-text" onclick="startQuiz()" style="font-size: 0.85rem; padding: 8px;">
                        最初からやり直す
                    </button>
                </div>
            </div>
        </div>

        <!-- Quiz Screen -->
        <div id="quiz-screen" class="hidden">
            <div class="top-actions">
                <button class="btn-text" onclick="showHomeConfirmModal()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round"><path d="M3 9l9-7 9 7v11a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2z"></path><polyline points="9 22 9 12 15 12 15 22"></polyline></svg>
                    ホームへ戻る
                </button>
            </div>

            <div class="progress-wrapper">
                <div class="progress-container">
                    <div id="progress-bar" class="progress-bar"></div>
                </div>
                <div id="progress-text" class="progress-text">1 / 50</div>
            </div>

            <div class="question-header">
                <span id="category-badge" class="category-badge">カテゴリ</span>
            </div>
            
            <h3 id="question-text" class="question-text"></h3>
            
            <div id="options-container" class="options">
                <!-- Options injected by JS -->
            </div>

            <!-- Instant Feedback Area -->
            <div id="feedback-area" class="feedback-area hidden">
                <div id="feedback-result" class="feedback-result"></div>
                <div id="feedback-explanation" class="feedback-explanation"></div>
                <button id="next-btn" class="btn" onclick="nextQuestion()">次の問題へ</button>
            </div>
        </div>

        <!-- Result Screen -->
        <div id="result-screen" class="hidden">
            <div class="result-header">
                <h2>クイズ完了！お疲れ様でした。</h2>
                <div class="score-display" id="final-score">0</div>
                <div class="accuracy-display" id="final-accuracy">正答率: 0%</div>
            </div>
            
            <!-- Category Analysis -->
            <div class="category-stats">
                <h3>📊 カテゴリ別 正答率</h3>
                <div id="category-stats-container">
                    <!-- Stats injected by JS -->
                </div>
            </div>

            <div class="action-buttons">
                <button class="btn btn-outline" onclick="restartQuiz()">もう一度挑戦する</button>
                <button class="btn btn-outline" onclick="downloadCSV()">
                    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" style="margin-right:5px;"><path d="M21 15v4a2 2 0 0 1-2 2H5a2 2 0 0 1-2-2v-4"></path><polyline points="7 10 12 15 17 10"></polyline><line x1="12" y1="15" x2="12" y2="3"></line></svg>
                    結果をCSV出力
                </button>
            </div>
        </div>
    </div>
</div>

<!-- Home Confirm Modal -->
<div id="home-confirm-modal" class="modal-overlay hidden">
    <div class="modal-content">
        <h3>ホーム画面に戻りますか？</h3>
        <p>現在の解答状況は保存され、後で続きから再開できます。</p>
        <div class="modal-actions">
            <button class="btn btn-outline" onclick="closeHomeConfirmModal()">キャンセル</button>
            <button class="btn" style="background-color: var(--primary-color);" onclick="returnToHome()">ホームへ戻る</button>
        </div>
    </div>
</div>

<script>
    // 問題データ (全50問: 2026年2月時点の最新トレンドに対応)
    const quizData = [
        // --- 基礎知識 (40%: 20問) ---
        {
            category: "基礎知識",
            q: "Googleが開発した生成AI「Gemini」の最大の特徴を一つ選ぶとすれば何ですか？",
            options: ["テキストしか理解できない点", "最初からテキスト、画像、音声、コードなどを同時に処理できるネイティブ・マルチモーダルとして構築された点", "オープンソースで誰でも自由にコードを改変できる点"],
            answer: 1,
            explanation: "Geminiは初期から複数の情報形式（モダリティ）を組み合わせて理解・処理できる「ネイティブ・マルチモーダル」として設計されています。"
        },
        {
            category: "基礎知識",
            q: "2026年初頭に展開されている、推論能力や自律エージェント機能がさらに強化されたGeminiの最新メジャーバージョンの名称は何ですか？",
            options: ["Gemini 2.5", "Gemini 3.1", "Gemini Ultra Max"],
            answer: 1,
            explanation: "2026年現在、高度な推論モデルや自律的にPCを操作するエージェント機能を備えた「Gemini 3.1」シリーズが最先端モデルとして展開されています。"
        },
        {
            category: "基礎知識",
            q: "AIがテキストを処理する際の最小単位を何と呼びますか？",
            options: ["ピクセル", "バイト", "トークン"],
            answer: 2,
            explanation: "AIはテキストを「トークン」という単位に分割して処理します。言語や文字の種類によって1トークンあたりの文字数は異なります。"
        },
        {
            category: "基礎知識",
            q: "最新のGemini Proモデルが備える「コンテキストウィンドウ（一度に処理できる情報量）」の規模はどのくらいに達していますか？",
            options: ["約8千トークン（論文1本分程度）", "約10万トークン（本1冊分程度）", "数百万〜1000万トークン以上（数千時間の動画や巨大なプログラムソースコード全体に相当）"],
            answer: 2,
            explanation: "Geminiは世代を重ねるごとにコンテキストウィンドウを拡大し、現在では数百万〜1000万トークン規模の超大容量データを一度に読み込んで分析可能です。"
        },
        {
            category: "基礎知識",
            q: "ユーザーが独自の指示や知識を与え、特定の目的に特化した「自分専用のGemini」を作成できる機能の名称は何ですか？",
            options: ["Gems (ジェム)", "Bots (ボッツ)", "Sparks (スパークス)"],
            answer: 0,
            explanation: "Gemini Advancedなどで利用可能な「Gems」機能を使えば、コーディングアシスタントや語学教師など、特定の役割を持ったカスタマイズAIを簡単に作成できます。"
        },
        {
            category: "基礎知識",
            q: "AIが事実とは異なるもっともらしいウソの回答を生成してしまう現象を何と呼びますか？",
            options: ["ハルシネーション（幻覚）", "オーバーフィッティング（過学習）", "シンギュラリティ（技術的特異点）"],
            answer: 0,
            explanation: "生成AIは確率に基づいて言葉を繋ぎ合わせているため、事実誤認（ハルシネーション）のリスクがあり、重要な情報はファクトチェックが不可欠です。"
        },
        {
            category: "基礎知識",
            q: "Googleの対話型AIサービスは、リリース当初（2023年）は何という名称でしたか？",
            options: ["LaMDA (ラムダ)", "Bard (バード)", "Assistant (アシスタント)"],
            answer: 1,
            explanation: "Googleは当初「Bard」としてサービスを開始しましたが、その後AIモデルの名前と統一するため「Gemini」へブランド名を変更しました。"
        },
        {
            category: "基礎知識",
            q: "有料プラン「Gemini Advanced」を利用することで得られる、最新の機能強化のメリットは何ですか？",
            options: ["広告が表示されなくなるだけ", "Gemini 3.1 Pro等の最新モデルへのアクセスに加え、ユーザーに代わって複雑なタスクを遂行する「高度な自律エージェント機能」が利用できる", "回答が常に100%正確になる"],
            answer: 1,
            explanation: "Gemini Advancedは、最上位モデルへのアクセスだけでなく、データ分析や自律的なタスク実行など、プロフェッショナル向けの高度な機能を提供します。"
        },
        {
            category: "基礎知識",
            q: "2026年現在、Geminiに統合されているGoogleの最新の画像生成モデルの名前は何ですか？",
            options: ["Imagen 4 (イマジェン フォー)", "Midjourney (ミッドジャーニー)", "DALL-E 3 (ダリ スリー)"],
            answer: 0,
            explanation: "GeminiにはGoogleの最新テキスト画像変換モデル「Imagen 4」が統合されており、極めてリアルでテキスト描写の正確な画像を生成できます。"
        },
        {
            category: "基礎知識",
            q: "AIの出力の「ランダム性」や「創造性」をコントロールするパラメータを何と呼びますか？",

            explanation: "アルファ碁（AlphaGo）などで知られるDeepMind社と、GoogleのAI研究チーム（Brain）が統合されて誕生した「Google DeepMind」がGeminiを開発しています。"
        },
        {
            category: "雑学",
            q: "Google DeepMindのCEOであり、AI研究の世界的権威として2024年にノーベル化学賞を受賞した人物は誰ですか？",
            options: ["サム・アルトマン", "デミス・ハサビス", "ジェフリー・ヒントン"],
            answer: 1,
            explanation: "デミス・ハサビス氏はDeepMindの共同創業者兼CEOであり、タンパク質の立体構造予測AI（AlphaFold）の功績などにより2024年にノーベル化学賞を受賞しました。"
        },
        {
            category: "雑学",
            q: "現在、GoogleおよびAlphabetのCEO（最高経営責任者）を務め、Geminiの発表でも前面に立っている人物は誰ですか？",
            options: ["ラリー・ペイジ", "マーク・ザッカーバーグ", "スンダー・ピチャイ"],
            answer: 2,
            explanation: "スンダー・ピチャイ氏はGoogleのCEOであり、Googleを「AIファースト」の企業へと変革するリーダーシップをとっています。"
        },
        {
            category: "雑学",
            q: "「Gemini」という名前の由来の一部とも言われており、NASAの宇宙開発計画の名前にもなった星座は何ですか？",
            options: ["オリオン座", "ふたご座 (Gemini)", "おおぐま座"],
            answer: 1,
            explanation: "Geminiはラテン語で「ふたご座」を意味します。DeepMindとGoogle Brainという2つの組織の統合や、アポロ計画への架け橋となったNASAのジェミニ計画などの意味が込められています。"
        },
        {
            category: "雑学",
            q: "Googleが最初のGeminiモデル（Gemini 1.0）を正式に発表した年はいつですか？",
            options: ["2021年", "2023年", "2025年"],
            answer: 1,
            explanation: "Gemini 1.0は2023年12月に正式発表されました。その後、コンテキストウィンドウを大幅に拡大した1.5シリーズや、高度なエージェント機能を備えた3.xシリーズへと驚異的なスピードで進化しています。"
        }
    ];

    // 状態管理変数
    let currentQuestionIndex = 0;
    let score = 0;
    let isAnswered = false; // 1問あたりの二重回答防止
    let answerHistory = []; // CSV出力用の回答履歴
    
    // カテゴリ別スコア管理
    let categoryScores = {
        "基礎知識": { correct: 0, total: 0, color: "var(--google-blue)" },
        "実践的活用": { correct: 0, total: 0, color: "var(--google-green)" },
        "雑学": { correct: 0, total: 0, color: "var(--google-yellow)" }
    };

    // DOM要素
    const startScreen = document.getElementById('start-screen');
    const quizScreen = document.getElementById('quiz-screen');
    const resultScreen = document.getElementById('result-screen');
    
    const questionText = document.getElementById('question-text');
    const optionsContainer = document.getElementById('options-container');
    const progressText = document.getElementById('progress-text');
    const categoryBadge = document.getElementById('category-badge');
    const progressBar = document.getElementById('progress-bar');
    
    const feedbackArea = document.getElementById('feedback-area');
    const feedbackResult = document.getElementById('feedback-result');
    const feedbackExp = document.getElementById('feedback-explanation');
    const nextBtn = document.getElementById('next-btn');

    // --- ブラウザ保存 (LocalStorage) 機能 ---
    function saveProgress() {
        const progress = {
            currentIndex: currentQuestionIndex,
            score: score,
            history: answerHistory,
            catScores: categoryScores,
            isAnswered: isAnswered
        };
        localStorage.setItem('geminiQuizProgress', JSON.stringify(progress));
    }

    function loadProgress() {
        const saved = localStorage.getItem('geminiQuizProgress');
        if (saved) {
            try {
                const progress = JSON.parse(saved);
                currentQuestionIndex = progress.currentIndex;
                score = progress.score;
                answerHistory = progress.history;
                categoryScores = progress.catScores;
                
                // フィードバック表示中（回答済み）に離脱した場合は、強制的に次の問題から再開する
                if (progress.isAnswered) {
                    currentQuestionIndex++;
                }

                if (currentQuestionIndex > 0 && currentQuestionIndex < quizData.length) {
                    updateStartScreen();
                } else if (currentQuestionIndex >= quizData.length) {
                    clearProgress(); // 全問完了状態でリロードした場合はクリア
                }
            } catch (e) {
                console.error("進行状況の読み込みに失敗しました", e);
                clearProgress();
            }
        }
    }

    function clearProgress() {
        localStorage.removeItem('geminiQuizProgress');
    }
    // ---------------------------------------

    // クイズ開始 (新規)
    function startQuiz() {
        startScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        currentQuestionIndex = 0;
        score = 0;
        answerHistory = [];
        clearProgress(); // 新規開始時に保存データをクリア
        
        // カテゴリスコアの初期化
        for (let cat in categoryScores) {
            categoryScores[cat].correct = 0;
            categoryScores[cat].total = 0;
        }

        // 事前に各カテゴリの総数を計算
        quizData.forEach(q => {
            if (categoryScores[q.category]) {
                categoryScores[q.category].total++;
            }
        });

        showQuestion();
    }

    // 問題の表示
    function showQuestion() {
        isAnswered = false;
        feedbackArea.classList.add('hidden');
        
        const currentQuiz = quizData[currentQuestionIndex];
        
        // UI更新
        progressText.innerText = `${currentQuestionIndex + 1} / ${quizData.length}`;
        categoryBadge.innerText = currentQuiz.category;
        
        const progressPercent = ((currentQuestionIndex) / quizData.length) * 100;
        progressBar.style.width = `${progressPercent}%`;

        questionText.innerText = currentQuiz.q;
        optionsContainer.innerHTML = '';

        currentQuiz.options.forEach((option, index) => {
            const button = document.createElement('button');
            button.innerText = option;
            button.classList.add('option-btn');
            button.onclick = () => handleAnswer(index, button);
            optionsContainer.appendChild(button);
        });
    }

    // 回答処理 (即時フィードバック)
    function handleAnswer(selectedIndex, selectedBtn) {
        if (isAnswered) return;
        isAnswered = true;
        
        const currentQuiz = quizData[currentQuestionIndex];
        const isCorrect = (selectedIndex === currentQuiz.answer);
        
        // スコア加算
        if (isCorrect) {
            score++;
            if (categoryScores[currentQuiz.category]) {
                categoryScores[currentQuiz.category].correct++;
            }
        }

        // 回答履歴の記録 (CSV用)
        answerHistory.push({
            qNum: currentQuestionIndex + 1,
            category: currentQuiz.category,
            question: currentQuiz.q,
            userAnswer: currentQuiz.options[selectedIndex],
            correctAnswer: currentQuiz.options[currentQuiz.answer],
            isCorrect: isCorrect ? '〇' : '×'
        });

        // ★解答したタイミングで状態をブラウザに保存
        saveProgress();

        // 選択肢のスタイル更新
        const allButtons = optionsContainer.querySelectorAll('.option-btn');
        allButtons.forEach((btn, idx) => {
            btn.disabled = true; // 全ボタン無効化
            if (idx === currentQuiz.answer) {
                btn.classList.add('correct'); // 正解を強調
            } else if (idx === selectedIndex && !isCorrect) {
                btn.classList.add('incorrect'); // 間違えた選択肢を赤く
            }
        });

        // フィードバック表示
        feedbackArea.classList.remove('hidden', 'correct', 'incorrect');
        
        if (isCorrect) {
            feedbackArea.classList.add('correct');
            feedbackResult.innerText = "⭕ 正解！";
        } else {
            feedbackArea.classList.add('incorrect');
            feedbackResult.innerText = "❌ 不正解...";
        }
        
        feedbackExp.innerHTML = `<strong>解説:</strong><br>${currentQuiz.explanation}`;
        
        // 最終問題の場合はボタンテキストを変更
        if (currentQuestionIndex === quizData.length - 1) {
            nextBtn.innerText = "結果を見る";
        } else {
            nextBtn.innerText = "次の問題へ";
        }
        
        // 少しスクロールして解説を見やすくする
        setTimeout(() => {
            feedbackArea.scrollIntoView({ behavior: 'smooth', block: 'nearest' });
        }, 100);
    }

    // 次へボタンの処理
    function nextQuestion() {
        currentQuestionIndex++;
        if (currentQuestionIndex < quizData.length) {
            showQuestion();
        } else {
            progressBar.style.width = '100%';
            showResults();
        }
    }

    // 結果表示
    function showResults() {
        clearProgress(); // 完了したら保存データを消す

        quizScreen.classList.add('hidden');
        resultScreen.classList.remove('hidden');

        document.getElementById('final-score').innerText = `${score}`;
        const accuracy = Math.round((score / quizData.length) * 100);
        document.getElementById('final-accuracy').innerText = `正答率: ${accuracy}%`;

        renderCategoryStats();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // カテゴリ別の成績表示
    function renderCategoryStats() {
        const container = document.getElementById('category-stats-container');
        container.innerHTML = '';

        for (const [catName, stats] of Object.entries(categoryScores)) {
            if (stats.total === 0) continue;
            
            const percent = Math.round((stats.correct / stats.total) * 100);
            
            const row = document.createElement('div');
            row.className = 'stat-row';
            row.innerHTML = `
                <div class="stat-label">${catName}</div>
                <div class="stat-bar-container">
                    <div class="stat-bar" style="width: ${percent}%; background-color: ${stats.color};"></div>
                </div>
                <div class="stat-value">${percent}%</div>
            `;
            container.appendChild(row);
        }
    }

    // CSVダウンロード機能 (エクセル対応)
    function downloadCSV() {
        if (answerHistory.length === 0) return;

        // エクセルで文字化けしないためのBOM(Byte Order Mark)
        const bom = new Uint8Array([0xEF, 0xBB, 0xBF]);
        
        // ヘッダー行
        let csvContent = "問題番号,カテゴリ,問題文,あなたの回答,正解,判定\n";
        
        // データ行
        answerHistory.forEach(row => {
            // カンマや改行が含まれる場合を考慮してダブルクォーテーションで囲み、内部のダブルクォーテーションはエスケープする
            const qNum = row.qNum;
            const category = `"${row.category.replace(/"/g, '""')}"`;
            const question = `"${row.question.replace(/"/g, '""')}"`;
            const userAnswer = `"${row.userAnswer.replace(/"/g, '""')}"`;
            const correctAnswer = `"${row.correctAnswer.replace(/"/g, '""')}"`;
            const isCorrect = row.isCorrect;
            
            csvContent += `${qNum},${category},${question},${userAnswer},${correctAnswer},${isCorrect}\n`;
        });

        const blob = new Blob([bom, csvContent], { type: 'text/csv;charset=utf-8;' });
        const url = URL.createObjectURL(blob);
        const link = document.createElement("a");
        link.setAttribute("href", url);
        link.setAttribute("download", "gemini_quiz_result.csv");
        
        document.body.appendChild(link);
        link.click();
        document.body.removeChild(link);
    }

    // クイズの中断・ホームへ戻るモーダル制御
    function showHomeConfirmModal() {
        document.getElementById('home-confirm-modal').classList.remove('hidden');
    }

    function closeHomeConfirmModal() {
        document.getElementById('home-confirm-modal').classList.add('hidden');
    }

    function returnToHome() {
        saveProgress(); // 念のため現在の状態を確実に保存
        closeHomeConfirmModal();
        quizScreen.classList.add('hidden');
        startScreen.classList.remove('hidden');
        updateStartScreen();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ホーム画面の進行状況表示更新
    function updateStartScreen() {
        const startBtn = document.getElementById('start-btn');
        const resumeActions = document.getElementById('resume-actions');
        const resumeText = document.getElementById('resume-text');

        // 解答途中（0より大きく、全問未満）の場合
        if (currentQuestionIndex > 0 && currentQuestionIndex < quizData.length) {
            startBtn.classList.add('hidden');
            resumeActions.classList.remove('hidden');
            resumeText.innerText = `現在 問${currentQuestionIndex + 1} まで進行中`;
        } else {
            startBtn.classList.remove('hidden');
            resumeActions.classList.add('hidden');
        }
    }

    // 続きから再開
    function resumeQuiz() {
        startScreen.classList.add('hidden');
        quizScreen.classList.remove('hidden');
        showQuestion(); // 保存されたインデックスに基づいて画面を再構築
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // クイズのリスタート (最初からやり直す)
    function restartQuiz() {
        resultScreen.classList.add('hidden');
        startScreen.classList.remove('hidden');
        currentQuestionIndex = 0; // 状態を初期化
        clearProgress();          // 保存データも削除
        updateStartScreen();
        window.scrollTo({ top: 0, behavior: 'smooth' });
    }

    // ★ ページ読み込み時に保存された状態を復元する
    window.onload = function() {
        loadProgress();
    };

</script>
